<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Massachusetts Long-Distance Trails</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    #map { height: 100vh; width: 100%; }
    .map-title {
      position: absolute; top: 15px; left: 60px; z-index: 1000;
      background: white; padding: 12px 16px; border-radius: 6px;
      box-shadow: 0 0 8px rgba(0,0,0,0.25);
    }
    .map-title h1 { margin: 0; font-size: 20px; }
    .map-title p { margin: 4px 0 0 0; font-size: 14px; }
    .legend {
      position: absolute; bottom: 30px; left: 15px; z-index: 1000;
      background: white; padding: 10px 14px; border-radius: 6px;
      box-shadow: 0 0 8px rgba(0,0,0,0.25); font-size: 14px;
      max-height: 230px; overflow-y: auto;
    }
    .legend-row { margin-top: 5px; white-space: nowrap; }
    .legend-line {
      display: inline-block; width: 30px; height: 4px; margin-right: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="map-title">
    <h1>Massachusetts Long-Distance Trails</h1>
    <p>Click a trail to view its mileage.</p>
  </div>

  <div id="map"></div>
  <div class="legend" id="legend"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map('map').setView([42.25, -72.2], 8);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      maxZoom: 20,
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    }).addTo(map);

    const trailColors = {
      "Appalachian Trail": "#d73027",
      "Taconic Crest Trail": "#4575b4",
      "New England Trail": "#1a9850",
      "Midstate Trail": "#984ea3",
      "Mahican Mohawk Trail": "#ff7f00",
      "Bay Circuit Trail": "#a65628"
    };

    function getTrailName(feature) {
      return feature.properties.NAME || feature.properties.Name || feature.properties.name || "Unnamed Trail";
    }

    function getMileage(feature) {
      const miles = feature.properties.GIS_MI || feature.properties.MILES || feature.properties.Miles || feature.properties.LENGTH || feature.properties.Shape__Length;
      return typeof miles === "number" ? miles.toFixed(2) : (miles || "Mileage not listed");
    }

    function trailStyle(feature) {
      const name = getTrailName(feature);
      return {
        color: trailColors[name] || "#666666",
        weight: 4,
        opacity: 0.9
      };
    }

    let trailsLayer;

    function highlightTrail(e) {
      e.target.setStyle({ weight: 7, opacity: 1 });
      e.target.bringToFront();
    }

    function resetTrail(e) {
      trailsLayer.resetStyle(e.target);
    }

    function trailPopup(feature, layer) {
      const name = getTrailName(feature);
      const miles = getMileage(feature);

      layer.bindPopup(`
        <div style="font-family: Arial, sans-serif;">
          <h3 style="margin: 0 0 6px 0;">${name}</h3>
          <p style="margin: 0;"><strong>Mileage:</strong> ${miles} miles</p>
        </div>
      `);

      layer.on({
        mouseover: highlightTrail,
        mouseout: resetTrail,
        click: function () {
          if (layer.getBounds) map.fitBounds(layer.getBounds(), { padding: [30, 30] });
        }
      });
    }

    function buildLegend() {
      const legendDiv = document.getElementById("legend");
      legendDiv.innerHTML = "<strong>Legend</strong>";

      Object.keys(trailColors).forEach(name => {
        legendDiv.innerHTML += `
          <div class="legend-row">
            <span class="legend-line" style="background:${trailColors[name]};"></span>${name}
          </div>
        `;
      });
    }

    fetch('trails.geojson')
      .then(response => {
        if (!response.ok) throw new Error('GeoJSON not found');
        return response.json();
      })
      .then(data => {
        trailsLayer = L.geoJSON(data, {
          style: trailStyle,
          onEachFeature: trailPopup
        }).addTo(map);

        map.fitBounds(trailsLayer.getBounds(), { padding: [20, 20] });
        buildLegend();
      })
      .catch(error => {
        console.error(error);
        alert('The trail data could not be loaded. Make sure index.html and trails.geojson are both uploaded to GitHub in the same repository folder.');
      });
  </script>
</body>
</html>
